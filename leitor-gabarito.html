<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor de Gabarito PRO</title>

<script async src="https://docs.opencv.org/4.5.5/opencv.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #222;
    color: white;
}
video, canvas {
    width: 90%;
    max-width: 500px;
    border-radius: 12px;
    margin-top: 10px;
}
button {
    padding: 12px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>📷 Leitor de Gabarito PRO</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>

<button onclick="iniciarCamera()">Ativar Câmera</button>
<button onclick="capturar()">Capturar</button>

<p id="resultado"></p>

<script>

const QUESTOES = 10;
const ALTERNATIVAS = ['A','B','C','D'];
let stream;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

async function iniciarCamera(){
    stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:"environment"} }
    });
    video.srcObject = stream;
}

function capturar(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video,0,0);

    const corrigido = detectarCartao(canvas);

    const imgData = corrigido.getContext('2d')
        .getImageData(0,0,corrigido.width,corrigido.height);

    const respostas = analisar(imgData, corrigido.width, corrigido.height);

    document.getElementById("resultado").innerText =
        JSON.stringify(respostas,null,2);
}

// 🔥 DETECÇÃO DO PAPEL
function detectarCartao(canvas){
    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    let edges = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(5,5), 0);
    cv.Canny(gray, edges, 75, 200);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();

    cv.findContours(edges, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    let maiorArea = 0;
    let melhor = null;

    for(let i=0;i<contours.size();i++){
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);

        if(area > maiorArea){
            let peri = cv.arcLength(cnt,true);
            let approx = new cv.Mat();
            cv.approxPolyDP(cnt, approx, 0.02*peri, true);

            if(approx.rows === 4){
                maiorArea = area;
                melhor = approx;
            }
        }
    }

    if(!melhor) return canvas;

    let pts = [];
    for(let i=0;i<4;i++){
        pts.push({
            x: melhor.data32S[i*2],
            y: melhor.data32S[i*2+1]
        });
    }

    pts.sort((a,b)=>a.y-b.y);

    let top = pts.slice(0,2).sort((a,b)=>a.x-b.x);
    let bottom = pts.slice(2,4).sort((a,b)=>a.x-b.x);

    let ordered = [top[0],top[1],bottom[1],bottom[0]];

    let w = 800, h = 1100;

    let srcTri = cv.matFromArray(4,1,cv.CV_32FC2,[
        ordered[0].x,ordered[0].y,
        ordered[1].x,ordered[1].y,
        ordered[2].x,ordered[2].y,
        ordered[3].x,ordered[3].y
    ]);

    let dstTri = cv.matFromArray(4,1,cv.CV_32FC2,[
        0,0,
        w,0,
        w,h,
        0,h
    ]);

    let M = cv.getPerspectiveTransform(srcTri,dstTri);
    let dst = new cv.Mat();

    cv.warpPerspective(src,dst,M,new cv.Size(w,h));

    let novo = document.createElement("canvas");
    novo.width = w;
    novo.height = h;
    cv.imshow(novo,dst);

    src.delete(); gray.delete(); edges.delete();
    contours.delete(); hierarchy.delete();
    dst.delete(); M.delete(); srcTri.delete(); dstTri.delete();

    return novo;
}

// 🔥 LEITURA DAS BOLHAS
function analisar(imageData,w,h){

    const gray = new Uint8Array(w*h);

    for(let i=0;i<w*h;i++){
        const r = imageData.data[i*4];
        const g = imageData.data[i*4+1];
        const b = imageData.data[i*4+2];
        gray[i] = 0.299*r + 0.587*g + 0.114*b;
    }

    const threshold = 130;

    const bin = new Uint8Array(w*h);
    for(let i=0;i<gray.length;i++){
        bin[i] = gray[i] < threshold ? 1 : 0;
    }

    const startX = w*0.25;
    const startY = h*0.30;
    const stepX = w*0.15;
    const stepY = h*0.07;
    const raio = 25;

    let resp = {};

    for(let q=1;q<=QUESTOES;q++){

        let melhor = null;
        let melhorScore = 0;

        for(let a=0;a<ALTERNATIVAS.length;a++){

            const cx = startX + a*stepX;
            const cy = startY + (q-1)*stepY;

            let escuro=0,total=0;

            for(let dy=-raio;dy<=raio;dy++){
                for(let dx=-raio;dx<=raio;dx++){

                    if(dx*dx+dy*dy>raio*raio) continue;

                    const x = Math.floor(cx+dx);
                    const y = Math.floor(cy+dy);

                    if(x>=0 && x<w && y>=0 && y<h){
                        total++;
                        if(bin[y*w+x]) escuro++;
                    }
                }
            }

            const dens = escuro/total;

            if(dens > melhorScore){
                melhorScore = dens;
                melhor = ALTERNATIVAS[a];
            }
        }

        resp[q] = melhorScore > 0.25 ? melhor : null;
    }

    return resp;
}

</script>

</body>
</html>
